<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/opciones.css') }}">

    <title>Opciones del simulador</title>

</head>

<body>

    <main class="contenedor">

        <h1>CONFIGURACIÓN DEL SIMULADOR</h1>

        <form action="/guardar_opciones" method="POST">

            <div class="grid-opciones">

                <!-- CLIMA -->

                <div class="card-configuracion" onclick="abrirModalClima()">

                    <img src="{{ url_for('static', filename='img/clima.jpeg') }}">

                    <h2>Clima</h2>

                </div>

                <!-- DIFICULTAD -->

                <div class="card-configuracion" onclick="abrirModalDificultad()">

                    <img src="{{ url_for('static', filename='img/dificultad.jpeg') }}">

                    <h2>Dificultad</h2>

                </div>

            </div>

            <!-- INPUTS OCULTOS -->

            <input type="hidden" name="clima" id="climaSeleccionado">

            <input type="hidden" name="dificultad" id="dificultadSeleccionada">

            <!-- BOTONES -->

            <div class="botones">

                <button type="submit" class="btn-continuar">

                    Iniciar

                </button>

                <button type="button" class="btn-volver" onclick="window.location.href='/seleccion_vehiculo'">

                    Volver

                </button>

            </div>

        </form>

    </main>

    <!-- MODAL CLIMA -->

    <div id="modalClima" class="modal">

        <div class="modal-contenido">

            <h2>Seleccionar clima</h2>

            <div class="opciones-modal">

                <!-- SOL -->

                <div class="opcion" onclick="seleccionarClima('Sol')">

                    <img src="{{ url_for('static', filename='img/sol.jpeg') }}">

                    <h3>Sol</h3>

                </div>

                <!-- LLUVIA -->

                <div class="opcion" onclick="seleccionarClima('Lluvia')">

                    <img src="{{ url_for('static', filename='img/lluvia.jpeg') }}">

                    <h3>Lluvia</h3>

                </div>

            </div>

            <button class="cerrar" onclick="cerrarModalClima()">

                Cerrar

            </button>

        </div>

    </div>

    <!-- MODAL DIFICULTAD -->

    <div id="modalDificultad" class="modal">

        <div class="modal-contenido">

            <h2>Seleccionar dificultad</h2>

            <div class="opciones-modal">

                <!-- NORMAL -->

                <div class="opcion" onclick="seleccionarDificultad('Normal')">

                    <img src="{{ url_for('static', filename='img/normal.png') }}">

                    <h3>Normal</h3>

                </div>

                <!-- DIFÍCIL -->

                <div class="opcion" onclick="seleccionarDificultad('Dificil')">

                    <img src="{{ url_for('static', filename='img/dificil.png') }}">

                    <h3>Difícil</h3>

                </div>

            </div>

            <button class="cerrar" onclick="cerrarModalDificultad()">

                Cerrar

            </button>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/opciones.js') }}"></script>

</body>

</html>
