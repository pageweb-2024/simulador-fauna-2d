<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/opciones.css') }}">

    <title>Opciones del simulador</title>
</head>

<body>

<main class="contenedor">

    <h1>SELECCIONAR DIFICULTAD</h1>

    <form action="/guardar_opciones" method="POST">

        <!-- OPCIONES -->
        <div class="grid-opciones">

            <!-- NORMAL -->
            <label class="card-configuracion">

                <input type="radio" name="dificultad" value="Normal" required>

                <img src="{{ url_for('static', filename='img/normal.png') }}">

                <h2>Normal</h2>

            </label>

            <!-- DIFÍCIL -->
            <label class="card-configuracion">

                <input type="radio" name="dificultad" value="Dificil">

                <img src="{{ url_for('static', filename='img/dificil.png') }}">

                <h2>Difícil</h2>

            </label>

        </div>

        <!-- BOTONES -->
        <div class="botones">

            <button type="submit" class="btn-continuar">
                Iniciar
            </button>

            <button type="button" class="btn-volver"
                onclick="window.location.href='/seleccion_vehiculo'">
                Volver
            </button>

        </div>

    </form>

</main>

<script src="{{ url_for('static', filename='js/opciones.js') }}"></script>

</body>
</html>
